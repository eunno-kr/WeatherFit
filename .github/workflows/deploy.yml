name: Deploy WeatherFit to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build main app
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Install Figma design dependencies
        working-directory: ./figma-design
        run: npm ci

      - name: Build Figma design app
        working-directory: ./figma-design
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Add Figma design app to Pages artifact
        run: mkdir -p dist/figma-design && cp -R figma-design/dist/. dist/figma-design/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
